[profiles]
claude-code = "$claude_model$git_branch$claude_context$claude_cost"

[claude_model]
format = "[$symbol$model]($style) "
symbol = "🤖 "
style = "bold cyan"

[claude_context]
format = "[$gauge $percentage]($style) "
gauge_width = 10

[[claude_context.display]]
threshold = 0
style = "bold green"

[[claude_context.display]]
threshold = 60
style = "bold yellow"

[[claude_context.display]]
threshold = 80
style = "bold red"

[claude_cost]
format = "[$symbol(\\$$cost)]($style) "
symbol = "💰 "
